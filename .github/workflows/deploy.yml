name: Build and Deploy

on:
  push:
    branches:
      - production
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          REACT_APP_BlockFrost_API_KEY_Mainnet: ${{ secrets.BLOCKFROST_API_KEY_MAINNET }}

      - name: Deploy to Bluehost via SFTP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.BLUEHOST_SSH_HOST }}
          username: ${{ secrets.BLUEHOST_SSH_USER }}
          password: ${{ secrets.BLUEHOST_SSH_PASSWORD }}
          port: 22
          source: "build/*"
          target: "mint.donada.io"
          strip_components: 1
